  <path d="M 180 256 A 76 76 0 0 1 332 256" fill="none" stroke="url(#accent-grad)" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Nota Musical -->
  <path d="M 210 320 A 35 30 0 1 1 175 290 A 35 30 0 0 1 210 320 Z" fill="url(#orange-grad)"/>
  <path d="M 330 270 A 35 30 0 1 1 295 240 A 35 30 0 0 1 330 270 Z" fill="url(#orange-grad)"/>
  <rect x="200" y="150" width="18" height="142" rx="9" fill="url(#orange-grad)"/>
